  <text x="704" y="407" fill="#315fba" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">Tools</text>
  <text x="662" y="432" fill="#3d444f" font-family="Arial, Helvetica, sans-serif" font-size="15">What can the agent do?</text>
  <text x="662" y="463" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">Foundry Toolboxes &#183; Tool Search</text>
  <text x="662" y="483" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">Skills &#183; MCP &#183; Azure Functions MCP</text>
  <text x="662" y="503" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">Code Interpreter &#183; Voice Live</text>
  <text x="662" y="523" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">Routines &#183; publishing routes</text>

  <rect x="928" y="368" width="272" height="196" rx="8" fill="#ffffff" stroke="#dce2ea"/>
  <circle cx="960" cy="402" r="17" fill="#a16207"/>
  <text x="955" y="408" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800">4</text>
  <text x="992" y="407" fill="#a16207" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">Harness</text>
  <text x="950" y="432" fill="#3d444f" font-family="Arial, Helvetica, sans-serif" font-size="15">How does it run safely?</text>
  <text x="950" y="463" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">Agent Framework &#183; Agent Service</text>
  <text x="950" y="483" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">Identity &#183; ACS &#183; ASSERT &#183; Rubric</text>
  <text x="950" y="503" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">Tracing/evals &#183; Optimizer &#183; ROI</text>
  <text x="950" y="523" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">Agent 365 &#183; governed distribution</text>

  <rect x="64" y="566" width="1136" height="74" rx="10" fill="#101217"/>
  <text x="94" y="594" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800">AI Infrastructure</text>
  <text x="94" y="618" fill="#c5cad3" font-family="Arial, Helvetica, sans-serif" font-size="12">Cobalt 200 VMs &#183; NVIDIA Vera/Rubin NVL72 &#183; RTX Spark to DGX Station for Windows &#183; Majorana 2 quantum chip &#183; Foundry Local &#183; Azure Local &#183; secure sandbox execution</text>
