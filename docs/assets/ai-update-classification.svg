<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Microsoft Build 2026 AI Update Classification</title>
  <desc id="desc">A layered map classifying AI updates into productionisation and governance, dev backend substrate, model, context, tools, harness, and AI infrastructure.</desc>
  <rect width="1280" height="720" fill="#f4f6f9"/>

  <text x="68" y="58" fill="#ec2a7b" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800">OPENING MAP</text>
  <text x="68" y="108" fill="#17191f" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="800">Build 2026 builder stack: dev substrate to production harness</text>
  <text x="68" y="190" fill="#5c6370" font-family="Arial, Helvetica, sans-serif" font-size="18">Read the announcements as a complete path: build the backend and agent harness, assemble model/context/tools, then operate it safely.</text>

  <rect x="64" y="210" width="1136" height="74" rx="10" fill="#ec2a7b"/>
  <text x="94" y="232" fill="#17191f" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800">Productionisation &amp; Governance Layer</text>
  <text x="94" y="255" fill="#17191f" font-family="Arial, Helvetica, sans-serif" font-size="12">Runtime/session state &#183; Agent Service hosted agents &#183; Azure Functions serverless agents &#183; Azure Container Apps sandboxes &#183; Agent Identity &#183; ACS &#183; ASSERT &#183; Rubric &#183; Evals/Tracing &#183; Observability</text>
  <text x="94" y="273" fill="#17191f" font-family="Arial, Helvetica, sans-serif" font-size="12">ROI &#183; Agent 365 &#183; Purview/Defender/Entra</text>

  <rect x="64" y="290" width="1136" height="74" rx="10" fill="#101217"/>
  <text x="94" y="320" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800">Dev / Backend Builder Substrate</text>
  <text x="94" y="344" fill="#c5cad3" font-family="Arial, Helvetica, sans-serif" font-size="12">Agent Framework &#183; Foundry Toolkit for VS Code &#183; Azure Functions agents/MCP &#183; Rayfin &#183; HorizonDB &#183; Cosmos DB MCP &#183; ACA samples &#183; GitHub SDKs/sandboxes</text>

  <rect x="64" y="368" width="274" height="196" rx="8" fill="#ffffff" stroke="#dce2ea"/>
  <circle cx="96" cy="402" r="17" fill="#ec2a7b"/>
  <text x="91" y="408" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800">1</text>
  <text x="128" y="407" fill="#9c1550" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">Model</text>
  <text x="86" y="432" fill="#3d444f" font-family="Arial, Helvetica, sans-serif" font-size="15">What intelligence do I use?</text>
  <text x="86" y="463" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">MAI models &#183; Fireworks AI on Foundry</text>
  <text x="86" y="483" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">Managed Compute &#183; Frontier Tuning</text>
  <text x="86" y="503" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">Foundry Local inference</text>
  <text x="86" y="523" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">NVIDIA/Anyscale placement</text>

  <rect x="352" y="368" width="274" height="196" rx="8" fill="#ffffff" stroke="#dce2ea"/>
  <circle cx="384" cy="402" r="17" fill="#0e7c74"/>
  <text x="379" y="408" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800">2</text>
  <text x="416" y="407" fill="#0e7c74" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">Context</text>
  <text x="374" y="432" fill="#3d444f" font-family="Arial, Helvetica, sans-serif" font-size="15">What does the agent know?</text>
  <text x="374" y="463" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">Foundry IQ &#183; Web IQ &#183; Work IQ</text>
  <text x="374" y="483" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">Fabric IQ &#183; knowledge bases</text>
  <text x="374" y="503" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">Agentic retrieval &#183; ontology context</text>
  <text x="374" y="523" fill="#707783" font-family="Arial, Helvetica, sans-serif" font-size="12">Content Understanding &#183; service memory</text>

  <rect x="640" y="368" width="274" height="196" rx="8" fill="#ffffff" stroke="#dce2ea"/>
  <circle cx="672" cy="402" r="17" fill="#315fba"/>
